{% if recent_achievements %}
<div class="recent-achievements mb-4">
    <h6 class="fw-bold mb-3">
        <i class="fas fa-clock me-2 text-primary"></i>
        Recently Unlocked
    </h6>
    <div class="list-group">
        {% for ua in recent_achievements %}
        <div class="list-group-item list-group-item-action d-flex align-items-center">
            <span class="achievement-icon me-3 fs-3">{{ ua.achievement.icon|default:"🏆" }}</span>
            <div class="flex-grow-1">
                <div class="fw-bold">{{ ua.achievement.name }}</div>
                <small class="text-muted">{{ ua.unlocked_at|timesince }} ago</small>
            </div>
            <span class="badge bg-warning text-dark">
                <i class="fas fa-star me-1"></i>+{{ ua.achievement.xp_reward }}
            </span>
        </div>
        {% endfor %}
    </div>
</div>
{% endif %}
