{% if recommendations %}
<div class="recommendations-section my-4">
    <h3 class="mb-3">
        <i class="fas fa-robot text-primary me-2"></i>
        Recommended for You
    </h3>
    <div class="row">
        {% for item in recommendations %}
        <div class="col-md-4 mb-3">
            <div class="card h-100 shadow-sm hover-shadow">
                <div class="card-body">
                    <h5 class="card-title">{{ item.course.title }}</h5>
                    <p class="card-text text-muted small">
                        {{ item.course.description|truncatewords:20 }}
                    </p>
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="badge bg-info">
                            <i class="fas fa-users me-1"></i>
                            {{ item.course.enrollments.count }} learners
                        </span>
                        <span class="badge bg-secondary">
                            Level {{ item.course.required_level }}
                        </span>
                    </div>
                    <p class="mt-2 small text-primary">
                        <i class="fas fa-lightbulb me-1"></i>
                        {{ item.reason }}
                    </p>
                    <a href="{% url 'course_detail' item.course.id %}"
                       class="btn btn-outline-primary btn-sm mt-2">
                        View Course
                    </a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endif %}
